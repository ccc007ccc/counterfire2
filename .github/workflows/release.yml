name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build portable executable
        run: cargo tauri build --no-bundle --ci

      - name: Stage portable executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\release\counterfire2.exe dist\CounterFire2-portable.exe

      - name: Build NSIS installer
        run: cargo tauri build --bundles nsis --ci

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: counterfire2-windows
          path: |
            dist/CounterFire2-portable.exe
            target/release/bundle/nsis/*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            dist/CounterFire2-portable.exe
            target/release/bundle/nsis/*.exe
